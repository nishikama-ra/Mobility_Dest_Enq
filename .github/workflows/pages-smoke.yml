name: Pages smoke check

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required files
        run: |
          test -f index.html
          test -f styles.css
          test -f app.js
          test -f gas/Code.gs
